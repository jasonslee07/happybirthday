<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For the Best Dad</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f4f8;
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --card-bg: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- SPLASH SCREEN ANIMATION --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            animation: fadeOut 1s ease-in-out 3.5s forwards; /* Fades out after 3.5 seconds */
        }

        #splash-screen h1 {
            color: white;
            font-size: 3rem;
            padding: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            animation: popIn 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* --- MAIN DASHBOARD --- */
        #main-container {
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 40px;
            color: var(--primary-color);
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* The Big Button */
        #big-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(44, 62, 80, 0.2);
            transition: all 0.3s ease;
        }

        #big-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 25px rgba(44, 62, 80, 0.3);
            background-color: #34495e;
        }

        /* The Small Button */
        #small-btn {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #small-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }

        /* --- NOTIFICATION BADGE --- */
        .badge {
            background-color: var(--accent-color);
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 0.8rem;
            font-weight: bold;
            display: none; /* Hidden by default */
        }

        /* --- MODAL (POPUP FOR MESSAGES) --- */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        #modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        #modal-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 80%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transform: scale(0.8);
            transition: all 0.3s ease;
            max-height: 70vh;
            overflow-y: auto;
        }

        #modal-overlay.active #modal-card {
            transform: scale(1);
        }

        #modal-title {
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--accent-color);
        }

        #modal-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            white-space: pre-wrap; /* Allows line breaks for unread lists */
        }

        .close-btn {
            background-color: var(--bg-color);
            color: var(--primary-color);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-btn:hover {
            background-color: #e2e8f0;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1>365 Reasons Why Daddy is the Best Dad in the World</h1>
    </div>

    <div id="main-container">
        <h2>Happy Birthday, Dad! ❤️</h2>
        <div class="button-container">
            <button id="big-btn" onclick="showTodayMessage()">💌 Open Today's Reason</button>
            <button id="small-btn" onclick="showUnreadMessages()">
                📬 Unread Messages <span id="unread-badge" class="badge">0</span>
            </button>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeModal(event)">
        <div id="modal-card" onclick="event.stopPropagation()">
            <h3 id="modal-title">Reason</h3>
            <div id="modal-text"></div>
            <button class="close-btn" onclick="closeModal(null, true)">Close</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ADD YOUR 365 REASONS HERE
        // ==========================================
        const reasons = [
            "You always know how to make me laugh when I'm feeling down.", // Day 1
            "You give the absolute best bear hugs.",                       // Day 2
            "You taught me how to be brave.",                              // Day 3
            "You always listen to my stories, even the boring ones.",      // Day 4
            "You work so hard for our family.",                            // Day 5
            // ... Keep adding more strings inside quotes, separated by commas! 
            // Make sure you have 365 of them eventually.
        ];

        // Fill the rest with placeholders just to prevent errors if you haven't written 365 yet
        while(reasons.length < 365) {
            reasons.push("I love you more than words can say! (Add more reasons to the code)");
        }

        // ==========================================
        // SYSTEM LOGIC (DO NOT EDIT BELOW THIS LINE UNLESS NEEDED)
        // ==========================================

        // Set or get the start date so the website knows what "Day 1" is
        let startDate = localStorage.getItem('dadSiteStartDate');
        if (!startDate) {
            // If it's his first time opening it, set midnight of today as Day 1
            startDate = new Date().setHours(0,0,0,0);
            localStorage.setItem('dadSiteStartDate', startDate);
        }

        // Get read history from storage
        let readHistory = JSON.parse(localStorage.getItem('dadSiteReadHistory')) || [];

        // Calculate what day we are currently on (0 to 364)
        const msPerDay = 24 * 60 * 60 * 1000;
        let todayDate = new Date().setHours(0,0,0,0);
        let daysPassed = Math.floor((todayDate - startDate) / msPerDay);
        
        // Ensure we don't go past 365 reasons
        if (daysPassed > 364) daysPassed = 364; 
        if (daysPassed < 0) daysPassed = 0;

        // Find unread messages (from Day 1 up to YESTERDAY)
        let unreadIndices = [];
        for (let i = 0; i < daysPassed; i++) {
            if (!readHistory.includes(i)) {
                unreadIndices.push(i);
            }
        }

        // Update the notification badge for the small button
        function updateBadge() {
            const badge = document.getElementById('unread-badge');
            if (unreadIndices.length > 0) {
                badge.style.display = 'inline-block';
                badge.innerText = unreadIndices.length;
            } else {
                badge.style.display = 'none';
            }
        }
        updateBadge();

        function showTodayMessage() {
            const modalTitle = document.getElementById('modal-title');
            const modalText = document.getElementById('modal-text');
            
            modalTitle.innerText = `Reason #${daysPassed + 1}`;
            modalText.innerText = reasons[daysPassed];

            // Mark today's as read so it doesn't go to the unread pile tomorrow
            if (!readHistory.includes(daysPassed)) {
                readHistory.push(daysPassed);
                localStorage.setItem('dadSiteReadHistory', JSON.stringify(readHistory));
            }

            openModal();
        }

        function showUnreadMessages() {
            const modalTitle = document.getElementById('modal-title');
            const modalText = document.getElementById('modal-text');

            if (unreadIndices.length === 0) {
                modalTitle.innerText = "All Caught Up!";
                modalText.innerText = "You have read all your past messages. Check the big button to see if you've opened today's message!";
            } else {
                modalTitle.innerText = "Missed Reasons";
                
                // Build a list of all missed messages
                let missedText = "";
                unreadIndices.forEach(index => {
                    missedText += `Day ${index + 1}:\n${reasons[index]}\n\n`;
                });
                modalText.innerText = missedText.trim();

                // Mark them all as read once he views them
                unreadIndices.forEach(index => {
                    readHistory.push(index);
                });
                localStorage.setItem('dadSiteReadHistory', JSON.stringify(readHistory));
                
                // Clear the unread array and update badge
                unreadIndices = [];
                updateBadge();
            }

            openModal();
        }

        function openModal() {
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal(event, force = false) {
            // Close if clicking the background overlay or the close button
            if (force || event.target.id === 'modal-overlay') {
                document.getElementById('modal-overlay').classList.remove('active');
            }
        }
    </script>
</body>
</html>
