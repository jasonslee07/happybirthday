<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For the Best Dad</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .modal-image {
            max-width: 100%;
            max-height: 250px;
            border-radius: 10px;
            
            /* These three lines are the magic trick to force it to center! */
            display: block;
            margin-left: auto;
            margin-right: auto;
            
            margin-top: 15px;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        .missed-item {
            margin-bottom: 30px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 15px;
            text-align: center; /* This forces all the text inside to center perfectly! */
        }

        :root {
            --bg-color: #f0f4f8;
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --card-bg: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- SPLASH SCREEN ANIMATION --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            animation: fadeOut 1s ease-in-out 3.5s forwards; /* Fades out after 3.5 seconds */
        }

        #splash-screen h1 {
            color: white;
            font-size: 3rem;
            padding: 20px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            animation: popIn 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; visibility: hidden; }
        }

        /* --- MAIN DASHBOARD --- */
        #main-container {
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        h2 {
            font-size: 2rem;
            margin-bottom: 40px;
            color: var(--primary-color);
        }

        .button-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* The Big Button */
        #big-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(44, 62, 80, 0.2);
            transition: all 0.3s ease;
        }

        #big-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 25px rgba(44, 62, 80, 0.3);
            background-color: #34495e;
        }

        /* The Small Button */
        #small-btn {
            background-color: transparent;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #small-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }

        /* --- NOTIFICATION BADGE --- */
        .badge {
            background-color: var(--accent-color);
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 0.8rem;
            font-weight: bold;
            display: none; /* Hidden by default */
        }

        /* --- MODAL (POPUP FOR MESSAGES) --- */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        #modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        #modal-card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            max-width: 500px;
            width: 80%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transform: scale(0.8);
            transition: all 0.3s ease;
            max-height: 70vh;
            overflow-y: auto;
        }

        #modal-overlay.active #modal-card {
            transform: scale(1);
        }

        #modal-title {
            font-size: 1.5rem;
            margin-top: 0;
            color: var(--accent-color);
        }

        #modal-text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .close-btn {
            background-color: var(--bg-color);
            color: var(--primary-color);
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-btn:hover {
            background-color: #e2e8f0;
        }

        /* --- PAGINATION BUTTONS --- */
        .pagination {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 2px solid var(--bg-color);
        }

        .page-btn {
            background-color: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Poppins', sans-serif;
        }

        .page-btn:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .page-btn.active {
            background-color: var(--primary-color);
            color: white;
            font-weight: bold;
            pointer-events: none; /* Stops them from clicking the page they are already on */
        }

    </style>
</head>
<body>

    <div id="splash-screen">
        <h1>365 Reasons Why Daddy is the Best Dad in the World</h1>
    </div>

    <div id="main-container">
        <h2>Happy Birthday, Daddy! ❤️</h2>
        <div class="button-container">
            <button id="big-btn" onclick="showTodayMessage()">💌 Open Today's Reason</button>
            <button id="small-btn" onclick="openPastMessages()">
                📬 Past Messages
            </button>
        </div>
    </div>

    <div id="modal-overlay" onclick="closeModal(event)">
        <div id="modal-card" onclick="event.stopPropagation()">
            <h3 id="modal-title">Reason</h3>
            <div id="modal-text"></div>
            <button class="close-btn" onclick="closeModal(null, true)">Close</button>
        </div>
    </div>

    <script src="reasons.js"></script>

    <script>
        

        // Fill the rest with placeholders just to prevent errors if you haven't written 365 yet
        while(reasons.length < 365) {
            reasons.push("I love you more than words can say! (Add more reasons to the code)");
        }

        // ==========================================
        // SYSTEM LOGIC (SYNCED ACROSS ALL DEVICES)
        // ==========================================

        // 1. SET YOUR START DATE HERE (Year, Month Index, Day)
        // IMPORTANT: Months in JavaScript start at 0 (January is 0, March is 2)
        const dayOneDate = new Date(2026, 2, 7); // This is March 8, 2026
        dayOneDate.setHours(0, 0, 0, 0);

        // 2. Get today's date and reset the clock to midnight
        let now = new Date();
        now.setHours(0, 0, 0, 0);

        // 3. Calculate how many days have passed since Day 1
        const msPerDay = 24 * 60 * 60 * 1000;
        let daysPassed = Math.round((now - dayOneDate) / msPerDay);
        
        // Safety checks
        if (daysPassed > 364) daysPassed = 364; 
        
        // This ensures that if he opens the site BEFORE the birthday, 
        // it just shows Day 1 (or you can show a "Coming Soon" message)
        if (daysPassed < 0) daysPassed = 0; 

        // Rest of the code (showTodayMessage, renderPastMessages, etc.) stays the same!

    

        // --- TODAY'S MESSAGE ---
        function showTodayMessage() {
            const modalTitle = document.getElementById('modal-title');
            const modalText = document.getElementById('modal-text');
            
            modalTitle.innerText = `Reason #${daysPassed + 1}`;
            
            // Inject the text and image for today
            modalText.innerHTML = `
                <p>${reasons[daysPassed].text}</p>
                <img src="${reasons[daysPassed].image}" class="modal-image" alt="Day ${daysPassed + 1}">
            `;

            openModal();
        }

        // --- PAGINATION VARIABLES ---
        let currentPage = 1;
        const messagesPerPage = 20;

        // Opens the modal and starts on page 1
        function openPastMessages() {
            currentPage = 1;
            renderPastMessages();
            openModal();
        }

        // Handles the math and rendering of the pages
        function renderPastMessages() {
            const modalTitle = document.getElementById('modal-title');
            const modalText = document.getElementById('modal-text');
            
            modalTitle.innerText = "Past Messages";
            
            // Total unlocked messages (includes today)
            let totalUnlocked = daysPassed + 1; 
            
            // Calculate how many pages we need
            let totalPages = Math.ceil(totalUnlocked / messagesPerPage);
            
            // Figure out which messages belong on the current page
            let startIndex = (currentPage - 1) * messagesPerPage;
            let endIndex = Math.min(startIndex + messagesPerPage, totalUnlocked);
            
            let contentHTML = "";
            
            // Generate the messages for this specific page
            for (let i = startIndex; i < endIndex; i++) {
                contentHTML += `
                <div class="missed-item">
                    <strong>Day ${i + 1}</strong><br>
                    <p>${reasons[i].text}</p>
                    <img src="${reasons[i].image}" class="modal-image" alt="Day ${i + 1}">
                </div>`;
            }
            
            // Generate the pagination buttons at the bottom (if there is more than 1 page)
            if (totalPages > 1) {
                contentHTML += `<div class="pagination">`;
                
                // Previous Button
                if (currentPage > 1) {
                    contentHTML += `<button class="page-btn" onclick="changePage(${currentPage - 1})">« Prev</button>`;
                }
                
                // Page Numbers
                for (let p = 1; p <= totalPages; p++) {
                    if (p === currentPage) {
                        contentHTML += `<button class="page-btn active">${p}</button>`;
                    } else {
                        contentHTML += `<button class="page-btn" onclick="changePage(${p})">${p}</button>`;
                    }
                }
                
                // Next Button
                if (currentPage < totalPages) {
                    contentHTML += `<button class="page-btn" onclick="changePage(${currentPage + 1})">Next »</button>`;
                }
                
                contentHTML += `</div>`;
            }
            
            modalText.innerHTML = contentHTML;
        }

        // Changes the page and instantly updates the modal
        function changePage(pageNumber) {
            currentPage = pageNumber;
            renderPastMessages();
            
            // Automatically scroll back to the top of the modal for the new page
            document.getElementById('modal-card').scrollTop = 0;
        }

        // --- MODAL CONTROLS ---
        function openModal() {
            document.getElementById('modal-overlay').classList.add('active');
        }

        function closeModal(event, force = false) {
            // Close if clicking the background overlay or the close button
            if (force || event.target.id === 'modal-overlay') {
                document.getElementById('modal-overlay').classList.remove('active');
            }
        }
    </script>
</body>
</html>
